# vani/setu CI/CD pipeline.
# Authority: Section 8.5 of SDS_Master_Architecture.md. Plan A→B→C of
# 2026-05-21 — push Vani live tree to GitLab + build the deploy path to
# vanisetu.rajyasabha.digital.
#
# Production model: docker-on-host (vanisetu.rajyasabha.digital is the dev
# host 10.21.217.17). Deploy uses a shell-executor runner registered on that
# host with tag `vani-prod-deploy`; the deploy job pulls newly-built images
# from the GitLab Container Registry and re-creates the docker-compose stack.
#
# A future migration to k8s/Helm would adapt infra/ci-templates/
# deploy-prod.gitlab-ci.yml (sds-prod-vani namespace, helm chart at
# deploy/chart). That path is documented in deploy/README.md.

stages:
  - lint
  - infra
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PHP_VERSION: "8.3"
  REGISTRY: "registry.gitlab.sds.local"
  IMAGE_PROJECT: "vani/setu"

# ─────────────────────── Stage: lint ───────────────────────

lint:ml-gateway:
  stage: lint
  image: "python:${PYTHON_VERSION}-slim"
  before_script:
    - pip install --no-cache-dir ruff==0.6.9
  script:
    - cd ml-gateway && ruff check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

lint:realtime-sidecar:
  stage: lint
  image: "node:${NODE_VERSION}-alpine"
  before_script:
    - cd realtime-sidecar && npm ci --no-audit --no-fund
  script:
    - cd realtime-sidecar && npm run lint || echo "lint script not defined, skipping"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

lint:laravel:
  stage: lint
  image: "php:${PHP_VERSION}-cli-alpine"
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cd src && composer install --no-interaction --prefer-dist --ignore-platform-req=ext-sockets --no-scripts
  script:
    - cd src && ./vendor/bin/pint --test || echo "pint not configured, skipping"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  allow_failure: true

# ─────────────────────── Stage: infra ───────────────────────
#
# Terraform follows /gov/Terraform/Environment_Deployment_Plan (DRAFT).pdf:
# one module stack for staging, UAT, and PROD. Jobs validate and plan only.
# Apply remains a separate manual/approved operation outside this pipeline
# until backend, DNS/TLS, secrets, storage, registry, backup, and approvals
# are confirmed.

.terraform:plan: &terraform_plan
  stage: infra
  image: hashicorp/terraform:1.9.8
  script:
    - cd "terraform/envs/$TF_ENV"
    - terraform init -backend=false
    - terraform fmt -check -recursive ../..
    - terraform validate
    - terraform plan -input=false -out="$CI_PROJECT_DIR/tfplan-$TF_ENV"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - "tfplan-$TF_ENV"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - terraform/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - terraform/**/*
        - .gitlab-ci.yml

terraform:plan:staging:
  <<: *terraform_plan
  variables:
    TF_ENV: "staging"

terraform:plan:uat:
  <<: *terraform_plan
  variables:
    TF_ENV: "uat"

terraform:plan:prod:
  <<: *terraform_plan
  variables:
    TF_ENV: "prod"

# ─────────────────────── Stage: test ───────────────────────

test:ml-gateway:
  stage: test
  image: "python:${PYTHON_VERSION}-slim"
  before_script:
    - cd ml-gateway && pip install --no-cache-dir -r requirements.txt
    - pip install --no-cache-dir pytest pytest-asyncio
  script:
    - cd ml-gateway && pytest -q --maxfail=3 --disable-warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  allow_failure: true

# ─────────────────────── Stage: build ───────────────────────
#
# Each service image is built via kaniko (rootless, daemonless) and pushed
# to the GitLab Container Registry. Tagged with $CI_COMMIT_SHORT_SHA AND :latest.

.build:image: &build_image
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$REGISTRY":{"auth":"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 -w0)"}}}
      EOF
    - /kaniko/executor
        --context "$CI_PROJECT_DIR/$BUILD_CONTEXT"
        --dockerfile "$CI_PROJECT_DIR/$DOCKERFILE_PATH"
        --destination "$REGISTRY/$IMAGE_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
        --destination "$REGISTRY/$IMAGE_PROJECT/$IMAGE_NAME:latest"
        --label "org.opencontainers.image.source=$CI_PROJECT_URL"
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA"
        --label "sds.gov.in/setu=vani"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:app:
  <<: *build_image
  variables:
    BUILD_CONTEXT: "."
    DOCKERFILE_PATH: "docker/app.Dockerfile"
    IMAGE_NAME: "app"

build:web:
  <<: *build_image
  variables:
    BUILD_CONTEXT: "."
    DOCKERFILE_PATH: "docker/web.Dockerfile"
    IMAGE_NAME: "web"

build:ml-gateway:
  <<: *build_image
  variables:
    BUILD_CONTEXT: "ml-gateway"
    DOCKERFILE_PATH: "ml-gateway/Dockerfile"
    IMAGE_NAME: "ml-gateway"

build:realtime-sidecar:
  <<: *build_image
  variables:
    BUILD_CONTEXT: "realtime-sidecar"
    DOCKERFILE_PATH: "realtime-sidecar/Dockerfile"
    IMAGE_NAME: "realtime-sidecar"

# ─────────────────────── Stage: deploy ───────────────────────
#
# Runs on the host shell-runner tagged vani-prod-deploy. Manual gate: only
# triggers after a human (or governance bot) clicks Play. Targets the same
# docker-compose project name the dev host is already running under so the
# existing networks and volumes are reused (sds-dev_vani-setu / caddy_data).

deploy:prod:
  stage: deploy
  tags: [vani-prod-deploy]
  environment:
    name: prod/vani
    url: https://vanisetu.rajyasabha.digital
    deployment_tier: production
  variables:
    COMPOSE_PROJECT_NAME: "sds-dev"
    DEPLOY_DIR: "/home/sds-dev"
  before_script:
    - docker login "$REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - |
      cd "$DEPLOY_DIR" || exit 1
      docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
      docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
  # Phase 3 (OQ-9, 2026-05-23): docker compose on .17 is being retired in favour
  # of helm on .132 (chart at sds-monorepo/deploy/vani-setu-laravel/). This job
  # would resurrect the retired stack if a human clicked Play. Gated with
  # when:never until promoted to a helm-upgrade rewrite (runbook §7 Option B)
  # after the .132 admin confirms StorageClass + platform Postgres.
  when: never
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
