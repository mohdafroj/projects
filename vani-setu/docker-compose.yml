x-app-environment: &app-environment
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${APP_KEY:?Set APP_KEY before starting Laravel app}
  APP_URL: https://vanisetu.rajyasabha.digital
  TRUSTED_PROXIES: 10.42.0.0/16,172.16.0.0/12,127.0.0.1
  SESSION_SECURE_COOKIE: "true"
  SESSION_SAME_SITE: strict
  CORS_ALLOWED_ORIGINS: https://vanisetu.rajyasabha.digital
  ASR_INGEST_SECRET: ${ASR_INGEST_SECRET:?Set ASR_INGEST_SECRET before starting Laravel app}
  REALTIME_AUDIT_SECRET: ${REALTIME_AUDIT_SECRET:?Set REALTIME_AUDIT_SECRET before starting Laravel app}
  ML_GATEWAY_SERVICE_TOKEN: ${ML_GATEWAY_SERVICE_TOKEN:?Set ML_GATEWAY_SERVICE_TOKEN before starting Laravel app}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: vani_setu
  DB_USERNAME: vani
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD before starting Laravel app}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: file
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: ${REVERB_APP_ID:-vanisetu-local}
  REVERB_APP_KEY: ${REVERB_APP_KEY:?Set REVERB_APP_KEY before starting Reverb}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:?Set REVERB_APP_SECRET before starting Reverb}
  REVERB_HOST: vanisetu.rajyasabha.digital
  REVERB_PORT: 443
  REVERB_SCHEME: https
  REVERB_SERVER_PORT: 8080
  MEILISEARCH_HOST: http://meilisearch:7700
  MEILISEARCH_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting Laravel app}

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: vani-setu-web:local
    container_name: vani-setu-web
    expose:
      - "80"
    volumes:
      - ./src:/var/www/html:ro
    depends_on:
      - app
    networks:
      - vani-setu

  postgres:
    image: postgres:16-alpine
    container_name: vani-setu-postgres
    environment:
      POSTGRES_DB: vani_setu
      POSTGRES_USER: vani
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD before starting Postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vani-setu

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: vani-setu-app:local
    container_name: vani-setu-app
    working_dir: /var/www/html
    environment: *app-environment
    volumes:
      - ./src:/var/www/html
      - ./sds-common-core-php:/var/www/sds-common-core-php:ro
    expose:
      - "9000"
    depends_on:
      - postgres
      - redis
    networks:
      - vani-setu

  worker:
    image: vani-setu-app:local
    container_name: vani-setu-worker
    restart: unless-stopped
    working_dir: /var/www/html
    environment: *app-environment
    command: php artisan horizon
    volumes:
      - ./src:/var/www/html
      - ./sds-common-core-php:/var/www/sds-common-core-php:ro
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - vani-setu

  audit:
    image: vani-setu-app:local
    container_name: vani-setu-audit
    restart: unless-stopped
    working_dir: /var/www/html
    environment: *app-environment
    command: php artisan queue:work redis --queue=audit --tries=1 --timeout=30 --sleep=1
    volumes:
      - ./src:/var/www/html
      - ./sds-common-core-php:/var/www/sds-common-core-php:ro
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - vani-setu

  reverb:
    image: vani-setu-app:local
    container_name: vani-setu-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    environment: *app-environment
    command: php artisan reverb:start --host=0.0.0.0
    volumes:
      - ./src:/var/www/html
      - ./sds-common-core-php:/var/www/sds-common-core-php:ro
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - vani-setu

  frontend:
    build:
      context: /opt/vanisetu/frontend
      dockerfile: ../docker/frontend.Dockerfile
    image: vani-setu-frontend:local
    container_name: vani-setu-frontend
    working_dir: /app
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - /opt/vanisetu/frontend/src:/app/src
    depends_on:
      - app
    networks:
      - vani-setu

  ml-gateway:
    build:
      context: ./ml-gateway
    image: vani-setu-ml-gateway:local
    container_name: vani-setu-ml-gateway
    env_file:
      - ./ml-gateway/.env
    environment:
      VANI_API_URL: http://web
      ML_GATEWAY_AUTH_REQUIRED: "true"
      ML_GATEWAY_SERVICE_TOKEN: ${ML_GATEWAY_SERVICE_TOKEN:?Set ML_GATEWAY_SERVICE_TOKEN before starting ML gateway}
      INDICTRANS2_ENDPOINT_URL: ${INDICTRANS2_ENDPOINT_URL:-http://tijori-dev-indictrans2:8000/v1/translate}
    ports:
      - "127.0.0.1:${ML_GATEWAY_PORT:-8001}:8000"
    depends_on:
      - web
    networks:
      - vani-setu
      - tijori-net

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: vani-setu-meilisearch
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting Meilisearch}
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - vani-setu

  realtime-sidecar:
    build:
      context: ./realtime-sidecar
    image: vani-setu-realtime-sidecar:local
    container_name: vani-setu-realtime-sidecar
    environment:
      PORT: 1234
      DATABASE_URL: postgres://vani:${DB_PASSWORD:?Set DB_PASSWORD before starting realtime-sidecar}@postgres:5432/vani_setu
      LARAVEL_BASE_URL: http://web
      REALTIME_AUDIT_SECRET: ${REALTIME_AUDIT_SECRET:?Set REALTIME_AUDIT_SECRET before starting realtime-sidecar}
    ports:
      - "127.0.0.1:1234:1234"
    depends_on:
      - app
      - postgres
    networks:
      - vani-setu

  caddy:
    image: caddy:2-alpine
    container_name: vani-setu-caddy
    ports:
      - "10.21.217.17:18080:80"
    volumes:
      - ./caddy/Caddyfile.private:/etc/caddy/Caddyfile
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile.public:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - /gov/Integration/SSL_certificate:/etc/caddy/gov-ssl:ro
      - /opt/vanisetu/frontend/dist:/srv/vanisetu-frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - frontend
      - ml-gateway
      - realtime-sidecar
    networks:
      - vani-setu

  redis:
    image: redis:7-alpine
    container_name: vani-setu-redis
    volumes:
      - redis-data:/data
    networks:
      - vani-setu

networks:
  vani-setu:
    driver: bridge
  tijori-net:
    external: true
    name: tijori-dev_tijori-dev-net

volumes:
  redis-data:
  postgres_data:
  meilisearch-data:
  caddy_data:
  caddy_config:
